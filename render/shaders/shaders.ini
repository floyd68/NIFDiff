; shaders.ini - user shader binding manifest (optional).
;
; Lets you route the renderer's MESH draw calls to your own shaders, per
; material kind, without touching the program. Delete this file (or leave
; everything commented) for stock behavior. Edits hot-reload within a second.
;
; [Programs]  declares shader programs:
;     Name=relative\path.hlsl            (entries default to VSMain/PSMain)
;     Name=relative\path.hlsl|VSEntry|PSEntry
;   Paths are relative to this shaders\ folder. Custom programs MUST
;   #include "Common.hlsli" (the renderer contract: constant buffers,
;   texture registers t0-t9, VSInput/PSInput) and use the same vertex input.
;   "Lit" is always defined (the built-in uber-shader).
;
; [Bind.Mesh]  routes each mesh to a program - FIRST matching rule wins:
;     Rule1=selector -> ProgramName
;     Rule2=* -> Lit
;   Selectors: pbr, complexmat, parallax, envmap, effect, decal,
;              node:<substring>  (matches the shape's node name),
;              tex:<substring>   (matches the diffuse texture path),
;              *                 (everything)
;   A rule naming an unknown/broken program falls back to Lit.
;
; Example - render every True PBR mesh with a custom shader:
;
; [Programs]
; MyToon=custom\MyToon.hlsl
;
; [Bind.Mesh]
; Rule1=pbr -> MyToon
; Rule2=* -> Lit
